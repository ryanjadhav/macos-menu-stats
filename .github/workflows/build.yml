name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: bash build.sh

      - name: Test
        run: swift test -v

      - name: Package app (ditto preserves symlinks and executable bits)
        run: ditto -c -k --sequesterRsrc --keepParent .build/release/MenuBarStats.app MenuBarStats.zip

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: MenuBarStats
          path: MenuBarStats.zip
          if-no-files-found: error
